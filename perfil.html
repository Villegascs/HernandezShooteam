<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Hernández Shoteam</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        .perfil-main { padding-top: 110px; min-height: 100vh; }
        .perfil-wrapper { max-width: 760px; margin: 0 auto; padding: 0 1rem 4rem; }
        .perfil-card {
            background: var(--clr-bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-lg);
            overflow: hidden;
        }
        .perfil-banner {
            height: 130px;
            background: linear-gradient(135deg, #1a1c21, #FF5C00 200%);
        }
        .perfil-avatar-section {
            display: flex;
            align-items: flex-end;
            gap: 1.5rem;
            padding: 0 2rem;
            margin-top: -52px;
            margin-bottom: 1.5rem;
        }
        .perfil-avatar-wrap { position: relative; width: 104px; height: 104px; flex-shrink: 0; }
        .perfil-avatar-img {
            width: 104px; height: 104px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--clr-primary), #FF8C00);
            border: 4px solid var(--clr-bg-card);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-heading); font-weight: 700; font-size: 2.2rem; color: #fff;
            overflow: hidden; cursor: pointer; transition: var(--transition);
        }
        .perfil-avatar-img:hover { opacity: 0.85; }
        .perfil-avatar-img img { width: 100%; height: 100%; object-fit: cover; }
        .perfil-avatar-edit {
            position: absolute; bottom: 4px; right: 4px;
            width: 28px; height: 28px;
            background: var(--clr-primary); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; color: #fff; cursor: pointer;
            border: 2px solid var(--clr-bg-card); transition: var(--transition);
        }
        .perfil-avatar-edit:hover { background: var(--clr-primary-hover); }
        .perfil-name-header { padding-bottom: 0.75rem; }
        .perfil-name-header h2 { font-size: 1.5rem; }
        .perfil-name-header p { color: var(--clr-text-muted); font-size: 0.9rem; }
        .perfil-form-section { padding: 0 2rem 2rem; }
        .perfil-section-title {
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--clr-primary); font-weight: 700;
            margin-bottom: 1.2rem; padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--glass-border);
        }
        .perfil-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
        .perfil-grid .full-width { grid-column: 1 / -1; }
        .perfil-field label {
            display: block; font-size: 0.82rem;
            color: var(--clr-text-muted); font-weight: 500; margin-bottom: 0.4rem;
        }
        .perfil-field input, .perfil-field select {
            width: 100%; padding: 0.75rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-sm);
            color: var(--clr-text-main); font-family: var(--font-body);
            font-size: 0.95rem; transition: var(--transition);
        }
        .perfil-field input:focus, .perfil-field select:focus {
            outline: none; border-color: var(--clr-primary);
            background: rgba(255,255,255,0.08);
        }
        .perfil-field input:disabled { opacity: 0.5; cursor: not-allowed; }
        .perfil-actions {
            display: flex; justify-content: flex-end;
            align-items: center; gap: 1rem; margin-top: 2rem;
        }
        .save-toast {
            display: none; align-items: center; gap: 0.5rem;
            font-size: 0.9rem; font-weight: 500; margin-right: auto;
            animation: toastIn 0.3s ease;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-8px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @media(max-width: 600px) {
            .perfil-grid { grid-template-columns: 1fr; }
            .perfil-grid .full-width { grid-column: 1; }
            .perfil-actions { flex-wrap: wrap; }
        }
    </style>
</head>
<body class="dashboard-body">

    <header id="header" class="header scrolled">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <span class="logo-accent">H</span>ERNÁNDEZ <span class="logo-sub">SHOTEAM</span>
            </a>
            <div style="display:flex; align-items:center; gap:1rem;">
                <a href="mis-cursos.html" class="nav-link" style="color:var(--clr-text-muted); font-size:0.9rem;">
                    <i class='bx bx-book-open'></i> Mis Cursos
                </a>
                <a href="index.html" class="nav-link" style="color:var(--clr-text-muted); font-size:0.9rem;">
                    <i class='bx bx-arrow-back'></i> Inicio
                </a>
            </div>
        </div>
    </header>

    <main class="perfil-main">
        <div class="perfil-wrapper">

            <div id="loadingState" style="text-align:center; padding:4rem; color:var(--clr-text-muted);">
                <i class='bx bx-loader-alt bx-spin' style="font-size:2.5rem; color:var(--clr-primary);"></i>
                <p style="margin-top:1rem;">Cargando perfil...</p>
            </div>

            <div class="perfil-card" id="perfilCard" style="display:none;">
                <div class="perfil-banner"></div>
                <div class="perfil-avatar-section">
                    <div class="perfil-avatar-wrap">
                        <div class="perfil-avatar-img" id="perfilAvatarImg" title="Haz clic para cambiar tu foto"></div>
                        <div class="perfil-avatar-edit" id="perfilAvatarEdit" title="Cambiar foto">
                            <i class='bx bx-camera'></i>
                        </div>
                        <input type="file" id="photoInput" accept="image/*" style="display:none;">
                    </div>
                    <div class="perfil-name-header">
                        <h2 id="perfilNombreHeader">–</h2>
                        <p id="perfilEmailHeader">–</p>
                    </div>
                </div>

                <div class="perfil-form-section">
                    <p class="perfil-section-title">Información Personal</p>
                    <div class="perfil-grid">
                        <div class="perfil-field">
                            <label for="fieldNombre">Nombre</label>
                            <input type="text" id="fieldNombre" placeholder="Juan">
                        </div>
                        <div class="perfil-field">
                            <label for="fieldApellido">Apellido</label>
                            <input type="text" id="fieldApellido" placeholder="Pérez">
                        </div>
                        <div class="perfil-field">
                            <label for="fieldNacimiento">Fecha de Nacimiento</label>
                            <input type="date" id="fieldNacimiento">
                        </div>
                        <div class="perfil-field">
                            <label for="fieldPais">País</label>
                            <select id="fieldPais">
                                <option value="">Selecciona tu país</option>
                                <option value="Venezuela">Venezuela</option>
                                <option value="Colombia">Colombia</option>
                                <option value="México">México</option>
                                <option value="Argentina">Argentina</option>
                                <option value="España">España</option>
                                <option value="Estados Unidos">Estados Unidos</option>
                                <option value="Chile">Chile</option>
                                <option value="Perú">Perú</option>
                                <option value="Ecuador">Ecuador</option>
                                <option value="Bolivia">Bolivia</option>
                                <option value="Paraguay">Paraguay</option>
                                <option value="Uruguay">Uruguay</option>
                                <option value="Brasil">Brasil</option>
                                <option value="Panamá">Panamá</option>
                                <option value="Costa Rica">Costa Rica</option>
                                <option value="Guatemala">Guatemala</option>
                                <option value="Cuba">Cuba</option>
                                <option value="República Dominicana">República Dominicana</option>
                                <option value="Otro">Otro</option>
                            </select>
                        </div>
                        <div class="perfil-field full-width">
                            <label for="fieldEmail">Correo Electrónico</label>
                            <input type="email" id="fieldEmail" disabled placeholder="tu@email.com">
                        </div>
                    </div>

                    <div class="perfil-actions">
                        <div class="save-toast" id="saveToast"></div>
                        <button class="btn btn-outline" id="btnCancelar" style="padding: 0.7rem 1.5rem;">
                            Cancelar
                        </button>
                        <button class="btn btn-primary" id="btnGuardar" style="padding: 0.7rem 1.5rem; gap:0.5rem;">
                            <i class='bx bx-save'></i> Guardar Cambios
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { initializeApp }     from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2Pu9Wd462rfD_MAsuLBQRDv_FhwADfPE",
            authDomain: "hernandez-shooteam.firebaseapp.com",
            projectId: "hernandez-shooteam",
            storageBucket: "hernandez-shooteam.firebasestorage.app",
            messagingSenderId: "70915285075",
            appId: "1:70915285075:web:9be848d74698c1d392a6a6"
        };

        const app     = initializeApp(firebaseConfig);
        const auth    = getAuth(app);
        const db      = getFirestore(app);
        const storage = getStorage(app);

        // ── Estado a nivel de módulo (disponible para todos los listeners) ──
        let currentUser  = null;
        let originalData = {};

        // ── Utilidades ───────────────────────────────────────────────────────
        function getInitials(name) {
            if (!name) return '?';
            return name.trim().split(' ').slice(0, 2).map(n => n[0].toUpperCase()).join('');
        }

        function setAvatarEl(el, photoURL, initials) {
            if (!el) return;
            el.innerHTML = photoURL
                ? `<img src="${photoURL}" alt="Avatar">`
                : initials;
        }

        function showFeedback(msg, type = 'success') {
            const toast  = document.getElementById('saveToast');
            const colors = { success: '#86efac', error: '#fca5a5' };
            const icons  = { success: 'bx-check-circle', error: 'bx-x-circle' };
            toast.style.color   = colors[type] || colors.success;
            toast.innerHTML     = `<i class='bx ${icons[type] || icons.success}'></i> ${msg}`;
            toast.style.display = 'flex';
            clearTimeout(window._toastTimer);
            window._toastTimer = setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }

        // ── CANCELAR (adjuntado inmediatamente al cargar la página) ──────────
        document.getElementById('btnCancelar').addEventListener('click', () => {
            document.getElementById('fieldNombre').value     = originalData.nombre    || '';
            document.getElementById('fieldApellido').value   = originalData.apellido  || '';
            document.getElementById('fieldNacimiento').value = originalData.birthdate || '';
            document.getElementById('fieldPais').value       = originalData.country   || '';
            showFeedback('Cambios descartados.', 'success');
        });

        // ── GUARDAR (adjuntado inmediatamente al cargar la página) ───────────
        document.getElementById('btnGuardar').addEventListener('click', async () => {
            if (!currentUser) {
                showFeedback('Debes iniciar sesión primero.', 'error');
                return;
            }

            const btn       = document.getElementById('btnGuardar');
            const nombre    = document.getElementById('fieldNombre').value.trim();
            const apellido  = document.getElementById('fieldApellido').value.trim();
            const birthdate = document.getElementById('fieldNacimiento').value;
            const country   = document.getElementById('fieldPais').value;
            const fullName  = [nombre, apellido].filter(Boolean).join(' ');

            if (!nombre) {
                showFeedback('Por favor ingresa tu nombre.', 'error');
                return;
            }

            const prevHTML   = btn.innerHTML;
            btn.innerHTML    = '<i class="bx bx-loader-alt bx-spin"></i> Guardando...';
            btn.disabled     = true;

            try {
                await setDoc(
                    doc(db, 'users', currentUser.uid),
                    { name: fullName, email: currentUser.email, birthdate, country },
                    { merge: true }
                );

                // Actualizar encabezado
                document.getElementById('perfilNombreHeader').textContent = fullName || currentUser.email.split('@')[0];

                // Actualizar datos originales (para futuros cancelar)
                originalData = { nombre, apellido, birthdate, country };

                showFeedback('¡Cambios guardados correctamente!', 'success');

            } catch (err) {
                console.error('Error guardando perfil:', err);
                showFeedback('Error: ' + (err.message || 'inténtalo de nuevo.'), 'error');
            } finally {
                btn.innerHTML = prevHTML;
                btn.disabled  = false;
            }
        });

        // ── FOTO DE PERFIL ───────────────────────────────────────────────────
        function triggerFileInput() { document.getElementById('photoInput').click(); }
        document.getElementById('perfilAvatarImg').addEventListener('click',  triggerFileInput);
        document.getElementById('perfilAvatarEdit').addEventListener('click', triggerFileInput);

        document.getElementById('photoInput').addEventListener('change', async (e) => {
            if (!currentUser) return;
            const file = e.target.files[0];
            if (!file) return;

            const avatarEl = document.getElementById('perfilAvatarImg');
            const initials = getInitials(document.getElementById('perfilNombreHeader').textContent || '?');
            avatarEl.innerHTML = '<i class="bx bx-loader-alt bx-spin" style="font-size:2rem"></i>';

            try {
                const storageRef = ref(storage, `avatars/${currentUser.uid}`);
                await uploadBytes(storageRef, file);
                const url = await getDownloadURL(storageRef);
                await setDoc(doc(db, 'users', currentUser.uid), { photoURL: url }, { merge: true });
                setAvatarEl(avatarEl, url, initials);
                showFeedback('¡Foto actualizada correctamente!', 'success');
            } catch (err) {
                console.error('Error subiendo foto:', err);
                setAvatarEl(avatarEl, null, initials);
                showFeedback('Error al subir la foto: ' + (err.message || 'inténtalo de nuevo.'), 'error');
            }

            e.target.value = ''; // reset para permitir re-seleccionar la misma imagen
        });

        // ── AUTENTICACIÓN (carga de datos del perfil) ────────────────────────
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            currentUser = user;

            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('perfilCard').style.display   = 'block';

            // Datos base desde Firebase Auth
            let userData = {
                name:      user.displayName || '',
                email:     user.email,
                photoURL:  null,
                birthdate: '',
                country:   ''
            };

            // Sobrescribir con datos de Firestore si existen
            try {
                const snap = await getDoc(doc(db, 'users', user.uid));
                if (snap.exists()) Object.assign(userData, snap.data());
            } catch (e) {
                console.warn('No se pudo leer Firestore:', e.message);
            }

            // Separar nombre / apellido
            const parts    = (userData.name || '').trim().split(' ');
            const nombre   = parts[0] || '';
            const apellido = parts.slice(1).join(' ') || '';

            // Rellenar formulario
            document.getElementById('fieldNombre').value     = nombre;
            document.getElementById('fieldApellido').value   = apellido;
            document.getElementById('fieldEmail').value      = user.email;
            document.getElementById('fieldNacimiento').value = userData.birthdate || '';
            document.getElementById('fieldPais').value       = userData.country   || '';

            // Encabezado de la card
            const fullName = userData.name || user.email.split('@')[0];
            document.getElementById('perfilNombreHeader').textContent = fullName;
            document.getElementById('perfilEmailHeader').textContent  = user.email;

            // Avatar
            const initials = getInitials(fullName);
            setAvatarEl(document.getElementById('perfilAvatarImg'), userData.photoURL, initials);

            // Guardar estado original para botón Cancelar
            originalData = {
                nombre,
                apellido,
                birthdate: userData.birthdate || '',
                country:   userData.country   || ''
            };
        });
    </script>
</body>
</html>
