<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Hernández Shoteam</title>
    <meta name="description" content="Accede a tu cuenta de Hernández Shoteam para ver tus cursos y progreso.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body class="auth-body">

    <!-- Header Lite -->
    <header id="header" class="header scrolled">
        <div class="container nav-container" style="justify-content: center;">
            <a href="index.html" class="logo">
                <span class="logo-accent">H</span>ERNÁNDEZ <span class="logo-sub">SHOTEAM</span>
            </a>
        </div>
    </header>

    <main class="auth-main">
        <div class="auth-container-wrapper glass-panel fade-in visible">
            <div class="auth-box">

                <!-- Error / Success Toast -->
                <div id="authToast" class="auth-toast" style="display:none;"></div>

                <!-- === FORMULARIO LOGIN === -->
                <div id="loginPanel">
                    <h2 class="auth-title">Inicia sesión en tu cuenta</h2>
                    <hr class="auth-divider">
                    
                    <form id="loginForm" class="auth-form" novalidate>
                        <div class="form-group">
                            <label for="login-email">Correo electrónico</label>
                            <div class="input-icon-wrapper">
                                <i class='bx bx-envelope input-icon'></i>
                                <input type="email" id="login-email" placeholder="usuario@email.com" required autocomplete="email">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="login-password">Contraseña</label>
                            <div class="input-icon-wrapper">
                                <i class='bx bx-lock-alt input-icon'></i>
                                <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
                                <button type="button" class="toggle-password" id="toggleLoginPwd" tabindex="-1">
                                    <i class='bx bx-hide'></i>
                                </button>
                            </div>
                        </div>
                        
                        <button type="submit" id="loginBtn" class="btn btn-primary w-100 auth-submit-btn">
                            Iniciar Sesión
                        </button>
                        
                        <div class="auth-footer text-center" style="margin-top: 1.5rem;">
                            <p style="color: var(--clr-text-muted); font-size: 0.9rem;">
                                ¿No tienes una cuenta? 
                                <a href="#" id="switchToRegister" class="auth-switch-link">Regístrate</a>
                            </p>
                        </div>
                    </form>
                </div>

                <!-- === FORMULARIO REGISTRO === -->
                <div id="registerPanel" style="display: none;">
                    <h2 class="auth-title">Crea una cuenta nueva</h2>
                    <hr class="auth-divider">
                    
                    <form id="registerForm" class="auth-form" novalidate>
                        <div class="form-group">
                            <label for="reg-name">Nombre completo</label>
                            <div class="input-icon-wrapper">
                                <i class='bx bx-user input-icon'></i>
                                <input type="text" id="reg-name" placeholder="Juan Pérez" required autocomplete="name">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="reg-email">Correo electrónico</label>
                            <div class="input-icon-wrapper">
                                <i class='bx bx-envelope input-icon'></i>
                                <input type="email" id="reg-email" placeholder="usuario@email.com" required autocomplete="email">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="reg-password">Contraseña</label>
                            <div class="input-icon-wrapper">
                                <i class='bx bx-lock-alt input-icon'></i>
                                <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" required autocomplete="new-password">
                                <button type="button" class="toggle-password" id="toggleRegPwd" tabindex="-1">
                                    <i class='bx bx-hide'></i>
                                </button>
                            </div>
                        </div>
                        
                        <button type="submit" id="registerBtn" class="btn btn-primary w-100 auth-submit-btn">
                            Crear Cuenta
                        </button>
                        
                        <div class="auth-footer text-center" style="margin-top: 1.5rem;">
                            <p style="color: var(--clr-text-muted); font-size: 0.9rem;">
                                ¿Ya tienes una cuenta? 
                                <a href="#" id="switchToLogin" class="auth-switch-link">Inicia Sesión</a>
                            </p>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            onAuthStateChanged,
            updateProfile
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            setDoc, 
            getDoc
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2Pu9Wd462rfD_MAsuLBQRDv_FhwADfPE",
            authDomain: "hernandez-shooteam.firebaseapp.com",
            projectId: "hernandez-shooteam",
            storageBucket: "hernandez-shooteam.firebasestorage.app",
            messagingSenderId: "70915285075",
            appId: "1:70915285075:web:9be848d74698c1d392a6a6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ── Helpers UI ──────────────────────────────────────────────────
        const toast = document.getElementById('authToast');

        function showToast(msg, type = 'error') {
            toast.textContent = msg;
            toast.className = `auth-toast auth-toast--${type}`;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }

        function setLoading(btn, loading, defaultText) {
            if (loading) {
                btn.innerHTML = '<i class="bx bx-loader-alt bx-spin"></i> Espera...';
                btn.disabled = true;
                btn.style.opacity = '0.8';
            } else {
                btn.innerHTML = defaultText;
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }

        function translateFirebaseError(code) {
            const errors = {
                'auth/user-not-found': 'No existe una cuenta con ese correo.',
                'auth/wrong-password': 'Contraseña incorrecta. Inténtalo de nuevo.',
                'auth/invalid-credential': 'Correo o contraseña incorrectos.',
                'auth/email-already-in-use': 'Ya existe una cuenta con ese correo.',
                'auth/weak-password': 'La contraseña debe tener al menos 6 caracteres.',
                'auth/invalid-email': 'El formato del correo no es válido.',
                'auth/too-many-requests': 'Demasiados intentos. Por favor espera un momento.',
                'auth/network-request-failed': 'Error de conexión. Verifica tu internet.'
            };
            return errors[code] || 'Ocurrió un error. Inténtalo de nuevo.';
        }

        // ── Panel Toggle ─────────────────────────────────────────────────
        document.getElementById('switchToRegister').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('registerPanel').style.display = 'block';
            toast.style.display = 'none';
        });

        document.getElementById('switchToLogin').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('registerPanel').style.display = 'none';
            document.getElementById('loginPanel').style.display = 'block';
            toast.style.display = 'none';
        });

        // ── Toggle Password Visibility ────────────────────────────────────
        function setupPasswordToggle(btnId, inputId) {
            document.getElementById(btnId).addEventListener('click', () => {
                const input = document.getElementById(inputId);
                const icon = document.querySelector(`#${btnId} i`);
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.replace('bx-hide', 'bx-show');
                } else {
                    input.type = 'password';
                    icon.classList.replace('bx-show', 'bx-hide');
                }
            });
        }
        setupPasswordToggle('toggleLoginPwd', 'login-password');
        setupPasswordToggle('toggleRegPwd', 'reg-password');

        // ── Si ya hay sesión activa, redirigir ────────────────────────────
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        // ── LOGIN ─────────────────────────────────────────────────────────
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            setLoading(btn, true);

            try {
                await signInWithEmailAndPassword(auth, email, password);
                btn.innerHTML = '<i class="bx bx-check"></i> ¡Bienvenido!';
                btn.style.backgroundColor = '#22c55e';
                btn.style.opacity = '1';
                setTimeout(() => { window.location.href = 'index.html'; }, 800);
            } catch (err) {
                setLoading(btn, false, 'Iniciar Sesión');
                showToast(translateFirebaseError(err.code));
            }
        });

        // ── REGISTRO ──────────────────────────────────────────────────────
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;

            if (!name) {
                showToast('Por favor ingresa tu nombre completo.');
                return;
            }

            setLoading(btn, true);

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Actualizar el displayName en Firebase Auth
                await updateProfile(user, { displayName: name });

                // Guardar datos en Firestore
                await setDoc(doc(db, 'users', user.uid), {
                    name: name,
                    email: email,
                    purchasedCourses: [],
                    createdAt: new Date().toISOString(),
                    language: 'es'
                });

                btn.innerHTML = '<i class="bx bx-check"></i> ¡Cuenta Creada!';
                btn.style.backgroundColor = '#22c55e';
                btn.style.opacity = '1';
                setTimeout(() => { window.location.href = 'index.html'; }, 800);
            } catch (err) {
                setLoading(btn, false, 'Crear Cuenta');
                showToast(translateFirebaseError(err.code));
            }
        });
    </script>
</body>
</html>
