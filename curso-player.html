<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor del Curso | Hernández Shoteam</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body class="player-body">

    <!-- Header Lite -->
    <header class="header scrolled player-header">
        <div class="player-nav-container">
            <a href="cursos.html" class="back-link" style="display: inline-flex; align-items: center; gap: 0.3rem; background: rgba(255,255,255,0.08); padding: 0.5rem 1.2rem; border-radius: 50px; font-weight: 500; transition: all 0.3s; color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,0.1);" onmouseover="this.style.background='rgba(255,255,255,0.15)'; this.style.borderColor='rgba(255,255,255,0.3)';" onmouseout="this.style.background='rgba(255,255,255,0.08)'; this.style.borderColor='rgba(255,255,255,0.1)';">
                <i class='bx bx-chevron-left' style="font-size: 1.2rem;"></i> Volver a Cursos
            </a>
            <div class="course-title-header" id="headerCourseTitle">Course Title Placeholder</div>
            <div class="user-menu">
                <!-- Botón Mi Panel removido -->
            </div>
        </div>
    </header>

    <main class="course-landing" style="margin-top: 60px;">
        <!-- Banner oscuro superior -->
        <div style="background: #0d1117; padding: 4rem 2rem; border-bottom: 1px solid var(--glass-border);">
            <div style="max-width: 1100px; margin: 0 auto; color: #fff;">
                <h1 id="courseHeroTitle" style="font-size: clamp(2rem, 4vw, 2.5rem); margin-bottom: 1rem;">Cargando curso...</h1>
                <p id="courseHeroDesc" style="font-size: 1.1rem; margin-bottom: 1.5rem; max-width: 700px; line-height: 1.6; color: #cbd5e1;">Por favor, espera un momento.</p>
                <div style="display: flex; gap: 1.2rem; align-items: center; font-size: 0.9rem; flex-wrap: wrap;" id="courseHeroStats">
                    <span id="courseHeroBadge" style="background: var(--clr-primary); color: #fff; padding: 0.3rem 0.6rem; font-weight: 700; border-radius: 4px; display: none;">Nivel</span>
                </div>
            </div>
        </div>

        <!-- Contenedor principal de 2 columnas -->
        <div class="course-details-grid">
            
            <!-- Columna Izquierda -->
            <div class="left-col">
                <!-- Lo que incluye -->
                <div style="margin-bottom: 3rem; background: var(--clr-bg-card); border: 1px solid var(--glass-border); padding: 2rem; border-radius: var(--border-radius-md);">
                    <h2 style="font-size: 1.5rem; margin-bottom: 1.5rem;">Este curso incluye:</h2>
                    <div id="courseBenefitsContainer" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.2rem; color: var(--clr-text-muted);">
                        <!-- Los beneficios se inyectarán aquí -->
                    </div>
                </div>

                <!-- Contenido del curso -->
                <div>
                    <h2 style="font-size: 1.5rem; margin-bottom: 1.5rem;">Contenido del curso</h2>
                    <p id="courseModulesSummary" style="color: var(--clr-text-muted); margin-bottom: 1rem; font-size: 0.9rem;"></p>
                    
                    <div class="course-modules" id="courseModulesContainer" style="border: 1px solid var(--glass-border); border-radius: var(--border-radius-md); overflow: hidden;">
                        <!-- Los módulos se cargarán dinámicamente -->
                    </div>
                </div>
            </div>

            <!-- Columna Derecha (Sticky Card) -->
            <div class="right-col">
                <div style="background: var(--clr-bg-card); border: 1px solid var(--glass-border); border-radius: var(--border-radius-lg); overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.4);">
                    <div style="position: relative;">
                        <img id="courseSidebarImg" src="" alt="Portada del curso" style="width: 100%; height: 200px; object-fit: cover; display: block;">
                        <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center;">
                            <div style="width: 60px; height: 60px; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.3s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                                <i class='bx bx-play' style="font-size: 2.5rem; color: #000; margin-left: 4px;"></i>
                            </div>
                        </div>
                    </div>
                    
                    <div style="padding: 2rem;">
                        <div style="display: flex; align-items: flex-end; gap: 0.8rem; margin-bottom: 0.5rem;">
                            <span id="courseSidebarPrice" style="font-size: 2.2rem; font-weight: 800; line-height: 1; color: var(--clr-primary);"></span>
                            <span id="courseSidebarOldPrice" style="color: var(--clr-text-muted); text-decoration: line-through; font-size: 1.1rem; padding-bottom: 0.2rem;"></span>
                        </div>
                        <p style="color: #ef4444; font-size: 0.9rem; margin-bottom: 1.5rem; font-weight: 600;"><i class='bx bx-alarm'></i> 50% de descuento. ¡Quedan 2 días!</p>
                        <button class="btn btn-primary btn-buy" style="width: 100%; padding: 1.2rem; font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; transition: transform 0.2s, box-shadow 0.2s;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 10px 20px rgba(255,92,0,0.3)';" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none';">Comprar curso</button>

                        <p style="text-align: center; font-size: 0.8rem; color: var(--clr-text-muted); margin-bottom: 0.5rem;">Garantía de reembolso de 30 días</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal de Registro de Compra -->
    <div class="modal-overlay" id="purchaseModal">
        <div class="purchase-modal">
            <i class='bx bx-x modal-close' onclick="closePurchaseModal()"></i>
            <h2 style="margin-bottom: 0.5rem; font-size: 1.8rem;">Registro de Inscripción</h2>
            <p style="color: var(--clr-text-muted); margin-bottom: 2rem; font-size: 0.9rem;">Completa tus datos para finalizar la compra vía WhatsApp.</p>
            
            <form class="purchase-form" id="purchaseForm">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" id="regNombre" placeholder="Tu nombre" required>
                    </div>
                    <div class="form-group">
                        <label>Apellido</label>
                        <input type="text" id="regApellido" placeholder="Tu apellido" required>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Fecha de Nacimiento</label>
                        <input type="date" id="regFechaNac" required onchange="calculateAge()">
                    </div>
                    <div class="form-group">
                        <label>Edad</label>
                        <input type="text" id="regEdad" placeholder="--" readonly>
                    </div>
                </div>

                <div class="form-group">
                    <label>Nacionalidad</label>
                    <input type="text" id="regNacionalidad" placeholder="Ej. Venezolano, Español..." required>
                </div>

                <div class="form-group">
                    <label>Curso Seleccionado</label>
                    <input type="text" id="regCurso" readonly>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-weight: 700; margin-top: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.8rem;">
                    <i class='bx bxl-whatsapp' style="font-size: 1.5rem;"></i> Finalizar en WhatsApp
                </button>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        function openPurchaseModal() {
            const modal = document.getElementById('purchaseModal');
            const cursoInput = document.getElementById('regCurso');
            const cursoTitulo = document.querySelector('h1').innerText;
            
            cursoInput.value = cursoTitulo;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closePurchaseModal() {
            const modal = document.getElementById('purchaseModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function calculateAge() {
            const birthDate = new Date(document.getElementById('regFechaNac').value);
            if (isNaN(birthDate)) return;
            
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            document.getElementById('regEdad').value = age + " años";
        }

        document.getElementById('purchaseForm').onsubmit = function(e) {
            e.preventDefault();
            
            const nombre = document.getElementById('regNombre').value;
            const apellido = document.getElementById('regApellido').value;
            const fecha = document.getElementById('regFechaNac').value;
            const edad = document.getElementById('regEdad').value;
            const nacionalidad = document.getElementById('regNacionalidad').value;
            const curso = document.getElementById('regCurso').value;

            const mensaje = `Hola Hernández Shoteam! 👋%0A%0AMe gustaría inscribirme en un curso. Aquí están mis datos:%0A%0A` +
                            `*Curso:* ${curso}%0A` +
                            `*Nombre:* ${nombre} ${apellido}%0A` +
                            `*Fecha de Nac.:* ${fecha}%0A` +
                            `*Edad:* ${edad}%0A` +
                            `*Nacionalidad:* ${nacionalidad}%0A%0A` +
                            `¿Cuáles son los pasos para el pago?`;

            const whatsappUrl = `https://wa.me/584244745917?text=${mensaje}`;
            window.open(whatsappUrl, '_blank');
            closePurchaseModal();
        };

        // Asignar el evento al botón de comprar original
        document.querySelector('.btn-buy').onclick = openPurchaseModal;
    </script>
</body>
</html>
